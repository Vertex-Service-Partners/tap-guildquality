version: 1
default_environment: dev
environments:
  - name: dev
plugins:
  extractors:
    - name: tap-guildquality
      namespace: tap_guildquality
      pip_url: -e .
      capabilities:
        - state
        - catalog
        - discover
        - about
      config:
        api_url: https://www.guildquality.com/company-api/v3
        start_date: "2020-01-01"
      # api_key is supplied via TAP_GUILDQUALITY_API_KEY in the environment.
  loaders:
    - name: target-jsonl
      variant: andyh1203
      pip_url: target-jsonl
